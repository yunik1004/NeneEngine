name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev libasound2-dev libvulkan-dev mesa-vulkan-drivers \
            pulseaudio libasound2-plugins
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -- --deny warnings
      - name: Start virtual audio
        run: |
          pulseaudio --start --exit-idle-time=-1
          mkdir -p ~/.config/alsa
          printf 'pcm.!default { type pulse }\nctl.!default { type pulse }\n' > ~/.config/alsa/asoundrc
      - run: cargo test --no-fail-fast
        env:
          WGPU_BACKEND: vulkan

  docs:
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
      - name: Install system libraries
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libasound2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build docs
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: "--deny warnings"
      - name: Add redirect
        run: echo '<meta http-equiv="refresh" content="0; url=nene">' > target/doc/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc
      - uses: actions/deploy-pages@v4
        id: deploy
